name: 🔨 Build

on:
  push:
    branches: [main, feature/*, develop]
  pull_request:
    branches: [main]

jobs:
  build-ui:
    name: 🎨 Build UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: rm -f package-lock.json && npm install
      - run: npm run build

  build-server:
    name: ⚙️ Build Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: rm -f package-lock.json && npm install
      - run: npm run build
