# =============================================================================
# Exyconn Mail Deployment
# Services: UI (Port: 4031) | Server (Port: 4032)
# Domain: mail.exyconn.com
# =============================================================================

name: 🚀 Deploy Mail

on:
  push:
    branches: [main]
    paths: ['ui/**', 'server/**', 'docker-compose.yml', '.github/workflows/deploy.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📢 Slack - Started
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "attachments": [{"color": "#0066FF", "blocks": [
              {"type": "header", "text": {"type": "plain_text", "text": "🚀 Mail - Deployment Started", "emoji": true}},
              {"type": "section", "fields": [
                {"type": "mrkdwn", "text": "*📦 Service:*\nExyconn Mail"},
                {"type": "mrkdwn", "text": "*🔌 Ports:*\n4031 (UI) | 4032 (Server)"},
                {"type": "mrkdwn", "text": "*👤 By:*\n${{ github.actor }}"},
                {"type": "mrkdwn", "text": "*🏷️ Build:*\n#${{ github.run_number }}"}
              ]}
            ]}]
          }' ${{ secrets.SLACK_WEBHOOK }}

      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build & Push UI
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/exyconn-mail-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & Push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/exyconn-mail-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🚀 Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            
            docker network create exyconn-network 2>/dev/null || true
            
            sudo fuser -k 4031/tcp 2>/dev/null || true
            sudo fuser -k 4032/tcp 2>/dev/null || true
            
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/exyconn-mail-server:latest
            docker stop exyconn-mail-server 2>/dev/null || true
            docker rm -f exyconn-mail-server 2>/dev/null || true
            
            docker ps -q --filter "publish=4032" | xargs -r docker stop || true
            docker ps -aq --filter "publish=4032" | xargs -r docker rm -f || true
            
            docker run -d \
              --name exyconn-mail-server \
              --restart unless-stopped \
              --network exyconn-network \
              -p 4032:4032 \
              -e NODE_ENV=production \
              -e PORT=4032 \
              -e MONGO_URI=${{ secrets.MONGO_URI }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }} \
              -e CORS_ORIGINS=${{ secrets.CORS_ORIGINS }} \
              -e MAIL_SERVER_HOSTNAME=${{ secrets.MAIL_SERVER_HOSTNAME }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/exyconn-mail-server:latest
            
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/exyconn-mail-ui:latest
            docker stop exyconn-mail-ui 2>/dev/null || true
            docker rm -f exyconn-mail-ui 2>/dev/null || true
            
            docker ps -q --filter "publish=4031" | xargs -r docker stop || true
            docker ps -aq --filter "publish=4031" | xargs -r docker rm -f || true
            
            docker run -d \
              --name exyconn-mail-ui \
              --restart unless-stopped \
              --network exyconn-network \
              -p 4031:80 \
              -e NODE_ENV=production \
              -e VITE_API_URL=https://mail-api.exyconn.com \
              ${{ secrets.DOCKERHUB_USERNAME }}/exyconn-mail-ui:latest
            
            sleep 5
            echo "=== Running Containers ==="
            docker ps --filter "name=exyconn-mail"

      - name: ✅ Slack - Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "attachments": [{"color": "#00C853", "blocks": [
              {"type": "header", "text": {"type": "plain_text", "text": "✅ Mail - Deployed!", "emoji": true}},
              {"type": "section", "fields": [
                {"type": "mrkdwn", "text": "*🌐 UI:*\nhttps://mail.exyconn.com"},
                {"type": "mrkdwn", "text": "*🔌 Ports:*\n4031 | 4032"}
              ]},
              {"type": "actions", "elements": [
                {"type": "button", "text": {"type": "plain_text", "text": "🌐 Open Mail"}, "url": "https://mail.exyconn.com", "style": "primary"}
              ]}
            ]}]
          }' ${{ secrets.SLACK_WEBHOOK }}

      - name: ❌ Slack - Failed
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "attachments": [{"color": "#FF1744", "blocks": [
              {"type": "header", "text": {"type": "plain_text", "text": "❌ Mail - FAILED!", "emoji": true}},
              {"type": "actions", "elements": [
                {"type": "button", "text": {"type": "plain_text", "text": "📋 Logs"}, "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "style": "danger"}
              ]}
            ]}]
          }' ${{ secrets.SLACK_WEBHOOK }}
